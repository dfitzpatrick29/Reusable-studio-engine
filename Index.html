<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reusable Studio Engine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { 
      width: 100%; height: 100%; 
      background: #050509; 
      font-family: system-ui, sans-serif; 
    }
    canvas#studio-canvas { 
      display: block; width: 100%; height: 100%; 
    }
  </style>
</head>
<body>
  <canvas id="studio-canvas"></canvas>
  
  <script>
    // All your code here - no imports needed
    const canvas = document.getElementById("studio-canvas");
    const ctx = canvas.getContext("2d");
    
    const state = { time: 0, dpi: window.devicePixelRatio || 1, mouseX: 0.5 };
    
    // setupCanvas
    function setupCanvas() {
      function resize() {
        const { innerWidth: w, innerHeight: h } = window;
        canvas.width = w * state.dpi;
        canvas.height = h * state.dpi;
        canvas.style.width = w + "px";
        canvas.style.height = h + "px";
        ctx.setTransform(state.dpi, 0, 0, state.dpi, 0, 0);
      }
      window.addEventListener("resize", resize);
      resize();
    }
    
    // input
    canvas.addEventListener("mousemove", (e) => {
      const rect = canvas.getBoundingClientRect();
      state.mouseX = (e.clientX - rect.left) / rect.width;
    });
    
    // loop
    function loop(timestamp) {
      state.time = timestamp / 1000;
      
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      
      ctx.clearRect(0, 0, w, h);
      
      const centerX = w * state.mouseX;
      const centerY = h / 2;
      const radius = 40 + 20 * Math.sin(state.time * 4);
      
      ctx.fillStyle = "#f94144";
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
      ctx.fill();
      
      requestAnimationFrame(loop);
    }
    
    // start everything
    setupCanvas();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
